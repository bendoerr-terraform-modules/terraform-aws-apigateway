# Thin caller -> reusable lint in bendoerr-terraform-modules/workflows (SHA-pinned, big-blast).
# Full TF-module set (all 4 gates default-on). This repo pins neither tflint_version nor
# markdownlint_flags in its per-repo baseline, so they're passed empty (= action defaults) to preserve
# findings-fidelity rather than inherit the reusable's lambda-derived defaults. egress uses the reusable
# default (a superset of this repo's set -> behavior-preserving). Caller grants the union the reusable
# jobs need. Lint isn't a required check -> rename cosmetic; proof is the fidelity-diff vs baseline.
name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    permissions:
      contents: read
      pull-requests: write
    uses: bendoerr-terraform-modules/workflows/.github/workflows/lint.yml@1c9572cfd56a2aa0b7bd89afe37545ea4c310e40
    with:
      tflint_version: ""
      markdownlint_flags: ""
